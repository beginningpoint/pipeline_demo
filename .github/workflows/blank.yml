name: Cangjie CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Cangjie SDK from repo
        run: |
          # 假设 SDK 包放在仓库根目录的 sdk/ 文件夹下
          mkdir -p /opt/cangjie
          tar -xzf sdk/cangjie-sdk-linux-x64-1.0.5.tar.gz -C /opt/cangjie --strip-components=1
          echo "/opt/cangjie/bin" >> $GITHUB_PATH
          echo "/opt/cangjie/tools/bin" >> $GITHUB_PATH

      - name: Verify installation
        run: cjpm --version

      - name: Run unit tests
        run: cjpm test
